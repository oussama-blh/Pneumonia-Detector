{% extends 'detector/base.html' %}

{% block content %}
<div class="hero-section fade-in">
    <h1 class="hero-title">Edit Patient</h1>
    <p class="hero-subtitle">Update information for {{ patient.first_name }} {{ patient.last_name }}.</p>
</div>

<div class="upload-card fade-in delay-1">
    <form method="post">
        {% csrf_token %}
        <div class="patient-form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; text-align: left;">
            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label style="color: var(--text-secondary); font-size: 0.9rem;">First Name</label>
                <input type="text" name="first_name" value="{{ patient.first_name }}" required style="padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(0,0,0,0.2); color: var(--text-primary);">
            </div>
            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label style="color: var(--text-secondary); font-size: 0.9rem;">Last Name</label>
                <input type="text" name="last_name" value="{{ patient.last_name }}" required style="padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(0,0,0,0.2); color: var(--text-primary);">
            </div>
            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label style="color: var(--text-secondary); font-size: 0.9rem;">Date of Birth</label>
                <input type="text" name="date_of_birth" id="dob-input" value="{{ patient.date_of_birth|date:'Y-m-d' }}" required readonly placeholder="Select date" style="padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(0,0,0,0.2); color: var(--text-primary); width: 100%; cursor: pointer; box-sizing: border-box;">
            </div>
            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label style="color: var(--text-secondary); font-size: 0.9rem;">Phone Number</label>
                <input type="tel" name="phone_number" value="{{ patient.phone_number }}" required placeholder="+213XXXXXXXXX" pattern="^\+213[567]\d{8}$" title="Format: +213 followed by 5, 6, or 7 then 8 digits" style="padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(0,0,0,0.2); color: var(--text-primary);">
            </div>
        </div>

        <div style="display: flex; justify-content: center; gap: 1rem; margin-top: 1.5rem;">
            <button type="submit" class="btn-primary">Save Changes</button>
            <a href="{% url 'patient_list' %}" style="padding: 0.8rem 2rem; border-radius: 99px; border: 1px solid var(--border-color); color: var(--text-secondary); text-decoration: none; font-weight: 600; display: inline-flex; align-items: center;">Cancel</a>
        </div>
    </form>

    {% if error %}
    <div style="margin-top: 1rem; padding: 1rem; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.5); border-radius: 8px; color: #ef4444; font-weight: 500; text-align: center;">
        {{ error }}
    </div>
    {% endif %}
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        var yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        yesterday.setHours(23, 59, 59, 999);

        if (typeof initDobPicker === 'function') {
            initDobPicker('dob-input', {
                maxDate: yesterday,
                initialValue: '{{ patient.date_of_birth|date:"Y-m-d" }}'
            });
        }
    });
</script>
{% endblock %}
