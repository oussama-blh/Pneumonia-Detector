databases:
  - name: pneumonia-db
    plan: free
    databaseName: pneumonia
    user: pneumonia_user

services:
  - type: web
    name: pneumonia-detection
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn pneumonia_project.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pneumonia-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.6"
